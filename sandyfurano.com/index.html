<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sandy Furano</title>
<meta name="description" content="The personal photo gallery of Sandy Furano.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter","Helvetica Neue",sans-serif;background:#fff;color:#1d1d1f;-webkit-font-smoothing:antialiased;}
nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.88);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:0.5px solid rgba(0,0,0,.1);padding:0 2rem;height:52px;display:flex;align-items:center;justify-content:space-between;}
.nav-name{font-size:.95rem;font-weight:600;color:#1d1d1f;letter-spacing:-.02em;}
.nav-sub{font-size:.8rem;color:#86868b;font-weight:400;}
.hero{text-align:center;padding:5rem 2rem 3rem;}
.hero-initial{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#f5f5f7,#e8e8ed);display:flex;align-items:center;justify-content:center;font-size:1.75rem;font-weight:300;color:#1d1d1f;margin:0 auto 1.5rem;border:0.5px solid rgba(0,0,0,.08);letter-spacing:-.02em;}
.hero h1{font-size:clamp(2.2rem,5vw,3.5rem);font-weight:700;letter-spacing:-.04em;color:#1d1d1f;line-height:1.05;margin-bottom:.6rem;}
.hero-sub{font-size:1rem;color:#86868b;font-weight:400;letter-spacing:-.01em;}
.filter-bar{display:flex;justify-content:center;gap:.5rem;padding:0 2rem 2.5rem;flex-wrap:wrap;}
.filter-btn{font-family:inherit;font-size:.8rem;font-weight:500;color:#1d1d1f;background:#f5f5f7;border:none;padding:.45rem 1.15rem;border-radius:20px;cursor:pointer;transition:all .18s;letter-spacing:-.01em;}
.filter-btn:hover{background:#e8e8ed;}
.filter-btn.active{background:#1d1d1f;color:#fff;}
.gallery{max-width:1280px;margin:0 auto;padding:0 1.5rem 6rem;}
.count-bar{text-align:center;font-size:.78rem;color:#86868b;margin-bottom:1.5rem;letter-spacing:.01em;}
.grid{columns:4;column-gap:10px;}
@media(max-width:1100px){.grid{columns:3;}}
@media(max-width:700px){.grid{columns:2;column-gap:8px;}}
@media(max-width:400px){.grid{columns:1;}}
.photo-item{break-inside:avoid;margin-bottom:10px;cursor:pointer;border-radius:10px;overflow:hidden;background:#f5f5f7;position:relative;}
.photo-item img{width:100%;display:block;transition:transform .45s cubic-bezier(.25,.46,.45,.94),opacity .35s;opacity:0;}
.photo-item img.loaded{opacity:1;}
.photo-item:hover img{transform:scale(1.04);}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .28s;}
.lightbox.open{opacity:1;pointer-events:all;}
#lb-img{max-width:90vw;max-height:88vh;object-fit:contain;border-radius:6px;transition:opacity .22s;}
.lb-close{position:absolute;top:1.1rem;right:1.4rem;background:rgba(255,255,255,.12);border:none;color:#fff;font-size:1.2rem;width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);transition:background .15s;}
.lb-close:hover{background:rgba(255,255,255,.22);}
.lb-prev,.lb-next{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.12);border:none;color:#fff;font-size:1.3rem;width:48px;height:48px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);transition:background .15s;user-select:none;}
.lb-prev{left:1rem;}.lb-next{right:1rem;}
.lb-prev:hover,.lb-next:hover{background:rgba(255,255,255,.22);}
.lb-counter{position:absolute;top:1.1rem;left:50%;transform:translateX(-50%);font-size:.75rem;color:rgba(255,255,255,.5);letter-spacing:.03em;font-family:inherit;}
.lb-caption{position:absolute;bottom:1.5rem;left:50%;transform:translateX(-50%);font-size:.78rem;color:rgba(255,255,255,.6);background:rgba(0,0,0,.45);padding:.35rem .9rem;border-radius:20px;backdrop-filter:blur(8px);white-space:nowrap;font-family:inherit;}
footer{text-align:center;padding:2rem;font-size:.75rem;color:#86868b;border-top:0.5px solid #f5f5f7;}
footer a{color:#86868b;text-decoration:none;}
footer a:hover{color:#1d1d1f;}
</style>
</head>
<body>
<nav>
  <div class="nav-name">Sandy Furano</div>
  <div class="nav-sub">Personal Gallery</div>
</nav>
<div class="hero">
  <div class="hero-initial">SF</div>
  <h1>Sandy Furano</h1>
  <p class="hero-sub">A personal photo gallery</p>
</div>
<div class="filter-bar">
  <button class="filter-btn active" data-filter="all">All Photos</button>
  <button class="filter-btn" data-filter="wedding">Wedding</button>
  <button class="filter-btn" data-filter="sandy-dave">Sandy &amp; Dave</button>
  <button class="filter-btn" data-filter="memories">Memories</button>
</div>
<div class="gallery">
  <div class="count-bar" id="count-bar"></div>
  <div class="grid" id="grid"></div>
</div>
<footer>© 2026 Sandy Furano &nbsp;·&nbsp; <a href="https://davefurano.com">Dave Furano</a></footer>
<div class="lightbox" id="lightbox">
  <div class="lb-counter" id="lb-counter"></div>
  <button class="lb-close" onclick="closeLB()">✕</button>
  <button class="lb-prev" onclick="navLB(-1)">‹</button>
  <img id="lb-img" src="" alt="">
  <button class="lb-next" onclick="navLB(1)">›</button>
  <div class="lb-caption" id="lb-caption"></div>
</div>
<script>
var BASE = "https://sandyfurano.com/SF/album/thumbs/";
var PHOTOS = [
  {f:"Sandy - Dave Wedding.jpg", l:"Sandy & Dave Wedding", t:["wedding","sandy-dave"]},
  {f:"Sandy - Dave Wedding 2.jpg", l:"Sandy & Dave Wedding", t:["wedding","sandy-dave"]},
  {f:"sandy dave.jpg", l:"Sandy & Dave", t:["sandy-dave"]},
  {f:"sandy dave 2.jpg", l:"Sandy & Dave", t:["sandy-dave"]},
  {f:"sandy dave 3.jpg", l:"Sandy & Dave", t:["sandy-dave"]},
  {f:"sandy dave 4.jpg", l:"Sandy & Dave", t:["sandy-dave"]},
  {f:"sandy dave 5.jpg", l:"Sandy & Dave", t:["sandy-dave"]},
  {f:"sandy dave 6.jpg", l:"Sandy & Dave", t:["sandy-dave"]},
  {f:"image001.jpg", l:"Memory", t:["memories"]},
  {f:"image002.jpg", l:"Memory", t:["memories"]},
  {f:"image003.jpg", l:"Memory", t:["memories"]},
  {f:"image004.jpg", l:"Memory", t:["memories"]},
  {f:"image005.jpg", l:"Memory", t:["memories"]},
  {f:"image006.jpg", l:"Memory", t:["memories"]},
  {f:"image007.jpg", l:"Memory", t:["memories"]},
  {f:"image008.jpg", l:"Memory", t:["memories"]},
  {f:"image009.jpg", l:"Memory", t:["memories"]},
  {f:"image010.jpg", l:"Memory", t:["memories"]},
  {f:"image011.jpg", l:"Memory", t:["memories"]},
  {f:"image012.jpg", l:"Memory", t:["memories"]},
  {f:"Imports - 2 of 17.jpg", l:"Photo", t:["memories"]},
  {f:"Imports - 3 of 17.jpg", l:"Photo", t:["memories"]},
  {f:"Imports - 5 of 17.jpg", l:"Photo", t:["memories"]},
  {f:"Imports - 6 of 17.jpg", l:"Photo", t:["memories"]},
  {f:"Imports - 7 of 17.jpg", l:"Photo", t:["memories"]},
  {f:"Imports - 9 of 17.jpg", l:"Photo", t:["memories"]},
  {f:"Imports - 12 of 17.jpg", l:"Photo", t:["memories"]},
  {f:"Imports - 13 of 17.jpg", l:"Photo", t:["memories"]},
  {f:"Imports - 14 of 17.jpg", l:"Photo", t:["memories"]},
  {f:"Imports - 15 of 17.jpg", l:"Photo", t:["memories"]},
  {f:"Imports - 16 of 17.jpg", l:"Photo", t:["memories"]},
  {f:"Imports - 2 of 18.jpg", l:"Photo", t:["memories"]},
  {f:"Imports - 3 of 18.jpg", l:"Photo", t:["memories"]},
  {f:"Imports - 4 of 18.jpg", l:"Photo", t:["memories"]},
  {f:"Imports - 5 of 18.jpg", l:"Photo", t:["memories"]},
  {f:"Imports - 6 of 18.jpg", l:"Photo", t:["memories"]},
  {f:"Imports - 7 of 18.jpg", l:"Photo", t:["memories"]},
  {f:"Imports - 9 of 18.jpg", l:"Photo", t:["memories"]},
  {f:"Imports - 10 of 18.jpg", l:"Photo", t:["memories"]},
  {f:"Imports - 11 of 18.jpg", l:"Photo", t:["memories"]},
  {f:"Imports - 12 of 18.jpg", l:"Photo", t:["memories"]},
  {f:"Imports - 13 of 18.jpg", l:"Photo", t:["memories"]},
  {f:"Imports - 14 of 18.jpg", l:"Photo", t:["memories"]},
  {f:"Imports - 15 of 18.jpg", l:"Photo", t:["memories"]},
  {f:"Imports - 16 of 18.jpg", l:"Photo", t:["memories"]},
  {f:"Imports - 3 of 19.jpg", l:"Photo", t:["memories"]},
  {f:"Imports - 5 of 19.jpg", l:"Photo", t:["memories"]},
  {f:"Imports - 16 of 19.jpg", l:"Photo", t:["memories"]},
];
var cur="all", vis=[], idx=0;
function getVis(){return cur==="all"?PHOTOS:PHOTOS.filter(function(p){return p.t.indexOf(cur)>=0;});}
function render(){
  vis=getVis();
  document.getElementById("count-bar").textContent=vis.length+" photo"+(vis.length!==1?"s":"");
  document.getElementById("grid").innerHTML=vis.map(function(p,i){
    return'<div class="photo-item" onclick="openLB('+i+')">'
      +'<img src="'+BASE+encodeURIComponent(p.f)+'" alt="'+p.l+'" loading="lazy" onload="this.classList.add(\'loaded\')">'
      +'</div>';
  }).join("");
}
document.querySelectorAll(".filter-btn").forEach(function(b){
  b.addEventListener("click",function(){
    document.querySelectorAll(".filter-btn").forEach(function(x){x.classList.remove("active");});
    b.classList.add("active"); cur=b.dataset.filter; render();
  });
});
function openLB(i){idx=i;showLB();document.getElementById("lightbox").classList.add("open");}
function showLB(){
  var p=vis[idx];
  var img=document.getElementById("lb-img");
  img.style.opacity="0"; img.src=BASE+encodeURIComponent(p.f);
  img.onload=function(){img.style.opacity="1";};
  document.getElementById("lb-caption").textContent=p.l;
  document.getElementById("lb-counter").textContent=(idx+1)+" / "+vis.length;
}
function closeLB(){document.getElementById("lightbox").classList.remove("open");}
function navLB(d){idx=(idx+d+vis.length)%vis.length;showLB();}
document.getElementById("lightbox").addEventListener("click",function(e){if(e.target===this)closeLB();});
document.addEventListener("keydown",function(e){
  if(e.key==="Escape")closeLB();
  if(e.key==="ArrowLeft")navLB(-1);
  if(e.key==="ArrowRight")navLB(1);
});
render();
</script>
</body>
</html>
