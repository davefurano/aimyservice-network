<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sandy Furano</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;background:#fff;color:#1d1d1f;-webkit-font-smoothing:antialiased;}
nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.88);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:0.5px solid rgba(0,0,0,.1);padding:0 2rem;height:52px;display:flex;align-items:center;justify-content:space-between;}
.nav-name{font-size:.95rem;font-weight:600;color:#1d1d1f;letter-spacing:-.02em;}
.nav-sub{font-size:.8rem;color:#86868b;}
.hero{text-align:center;padding:5rem 2rem 3.5rem;}
.hero-initial{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#f5f5f7,#e8e8ed);display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:300;color:#1d1d1f;margin:0 auto 1.5rem;border:0.5px solid rgba(0,0,0,.08);}
.hero h1{font-size:clamp(2rem,5vw,3.5rem);font-weight:700;letter-spacing:-.04em;color:#1d1d1f;line-height:1.05;margin-bottom:.6rem;}
.hero-sub{font-size:1rem;color:#86868b;font-weight:400;}
.filter-bar{display:flex;justify-content:center;gap:.5rem;padding:0 2rem 2rem;flex-wrap:wrap;}
.filter-btn{font-family:inherit;font-size:.8rem;font-weight:500;color:#1d1d1f;background:#f5f5f7;border:none;padding:.4rem 1.1rem;border-radius:20px;cursor:pointer;transition:all .15s;}
.filter-btn:hover{background:#e8e8ed;}
.filter-btn.active{background:#1d1d1f;color:#fff;}
.gallery{max-width:1200px;margin:0 auto;padding:0 1.5rem 5rem;}
.grid{columns:4;column-gap:12px;}
@media(max-width:1024px){.grid{columns:3;}}
@media(max-width:640px){.grid{columns:2;column-gap:8px;}}
.photo-item{break-inside:avoid;margin-bottom:12px;cursor:pointer;border-radius:12px;overflow:hidden;background:#f5f5f7;}
.photo-item img{width:100%;display:block;transition:transform .4s cubic-bezier(.25,.46,.45,.94),opacity .3s;opacity:0;}
.photo-item img.loaded{opacity:1;}
.photo-item:hover img{transform:scale(1.03);}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;}
.lightbox.open{opacity:1;pointer-events:all;}
#lb-img{max-width:90vw;max-height:88vh;object-fit:contain;border-radius:8px;transition:opacity .25s;}
.lb-close{position:absolute;top:1rem;right:1.25rem;background:rgba(255,255,255,.12);border:none;color:#fff;font-size:1.4rem;width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px);}
.lb-close:hover{background:rgba(255,255,255,.22);}
.lb-prev,.lb-next{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.12);border:none;color:#fff;font-size:1.4rem;width:48px;height:48px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px);}
.lb-prev{left:1rem;}.lb-next{right:1rem;}
.lb-prev:hover,.lb-next:hover{background:rgba(255,255,255,.22);}
.lb-counter{position:absolute;top:1rem;left:50%;transform:translateX(-50%);font-size:.78rem;color:rgba(255,255,255,.5);}
.lb-caption{position:absolute;bottom:1.5rem;left:50%;transform:translateX(-50%);font-size:.8rem;color:rgba(255,255,255,.6);background:rgba(0,0,0,.4);padding:.35rem .85rem;border-radius:20px;backdrop-filter:blur(8px);white-space:nowrap;}
footer{text-align:center;padding:2rem;font-size:.78rem;color:#86868b;border-top:0.5px solid #f5f5f7;}
footer a{color:#86868b;text-decoration:none;}
</style>
</head>
<body>
<nav>
  <div class="nav-name">Sandy Furano</div>
  <div class="nav-sub">Personal Gallery</div>
</nav>
<div class="hero">
  <div class="hero-initial">SF</div>
  <h1>Sandy Furano</h1>
  <p class="hero-sub">A personal photo gallery</p>
</div>
<div class="filter-bar">
  <button class="filter-btn active" data-filter="all">All Photos</button>
  <button class="filter-btn" data-filter="wedding">Wedding</button>
  <button class="filter-btn" data-filter="sandy-dave">Sandy &amp; Dave</button>
  <button class="filter-btn" data-filter="memories">Memories</button>
</div>
<div class="gallery"><div class="grid" id="grid"></div></div>
<footer>© 2026 Sandy Furano &nbsp;·&nbsp; <a href="https://davefurano.com">Dave Furano</a></footer>
<div class="lightbox" id="lightbox">
  <div class="lb-counter" id="lb-counter"></div>
  <button class="lb-close" onclick="closeLB()">✕</button>
  <button class="lb-prev" onclick="navLB(-1)">‹</button>
  <img id="lb-img" src="" alt="">
  <button class="lb-next" onclick="navLB(1)">›</button>
  <div class="lb-caption" id="lb-caption"></div>
</div>
<script>
var BASE="https://sandyfurano.com/SF/album/";
var PHOTOS=[
  {thumb:"thumbs/Sandy - Dave Wedding.jpg",label:"Sandy & Dave Wedding",tags:["wedding","sandy-dave"]},
  {thumb:"thumbs/Sandy - Dave Wedding 2.jpg",label:"Sandy & Dave Wedding",tags:["wedding","sandy-dave"]},
  {thumb:"thumbs/sandy dave.jpg",label:"Sandy & Dave",tags:["sandy-dave"]},
  {thumb:"thumbs/sandy dave 2.jpg",label:"Sandy & Dave",tags:["sandy-dave"]},
  {thumb:"thumbs/sandy dave 3.jpg",label:"Sandy & Dave",tags:["sandy-dave"]},
  {thumb:"thumbs/sandy dave 4.jpg",label:"Sandy & Dave",tags:["sandy-dave"]},
  {thumb:"thumbs/sandy dave 5.jpg",label:"Sandy & Dave",tags:["sandy-dave"]},
  {thumb:"thumbs/sandy dave 6.jpg",label:"Sandy & Dave",tags:["sandy-dave"]},
  {thumb:"thumbs/image001.jpg",label:"Memory",tags:["memories"]},
  {thumb:"thumbs/image002.jpg",label:"Memory",tags:["memories"]},
  {thumb:"thumbs/image003.jpg",label:"Memory",tags:["memories"]},
  {thumb:"thumbs/image004.jpg",label:"Memory",tags:["memories"]},
  {thumb:"thumbs/image005.jpg",label:"Memory",tags:["memories"]},
  {thumb:"thumbs/image006.jpg",label:"Memory",tags:["memories"]},
  {thumb:"thumbs/image007.jpg",label:"Memory",tags:["memories"]},
  {thumb:"thumbs/image008.jpg",label:"Memory",tags:["memories"]},
  {thumb:"thumbs/image009.jpg",label:"Memory",tags:["memories"]},
  {thumb:"thumbs/image010.jpg",label:"Memory",tags:["memories"]},
  {thumb:"thumbs/image011.jpg",label:"Memory",tags:["memories"]},
  {thumb:"thumbs/image012.jpg",label:"Memory",tags:["memories"]},
  {thumb:"thumbs/Imports - 2 of 17.jpg",label:"Photo",tags:["memories"]},
  {thumb:"thumbs/Imports - 3 of 17.jpg",label:"Photo",tags:["memories"]},
  {thumb:"thumbs/Imports - 5 of 17.jpg",label:"Photo",tags:["memories"]},
  {thumb:"thumbs/Imports - 6 of 17.jpg",label:"Photo",tags:["memories"]},
  {thumb:"thumbs/Imports - 7 of 17.jpg",label:"Photo",tags:["memories"]},
  {thumb:"thumbs/Imports - 9 of 17.jpg",label:"Photo",tags:["memories"]},
  {thumb:"thumbs/Imports - 12 of 17.jpg",label:"Photo",tags:["memories"]},
  {thumb:"thumbs/Imports - 13 of 17.jpg",label:"Photo",tags:["memories"]},
  {thumb:"thumbs/Imports - 14 of 17.jpg",label:"Photo",tags:["memories"]},
  {thumb:"thumbs/Imports - 15 of 17.jpg",label:"Photo",tags:["memories"]},
  {thumb:"thumbs/Imports - 16 of 17.jpg",label:"Photo",tags:["memories"]},
  {thumb:"thumbs/Imports - 2 of 18.jpg",label:"Photo",tags:["memories"]},
  {thumb:"thumbs/Imports - 3 of 18.jpg",label:"Photo",tags:["memories"]},
  {thumb:"thumbs/Imports - 4 of 18.jpg",label:"Photo",tags:["memories"]},
  {thumb:"thumbs/Imports - 5 of 18.jpg",label:"Photo",tags:["memories"]},
  {thumb:"thumbs/Imports - 6 of 18.jpg",label:"Photo",tags:["memories"]},
  {thumb:"thumbs/Imports - 7 of 18.jpg",label:"Photo",tags:["memories"]},
  {thumb:"thumbs/Imports - 9 of 18.jpg",label:"Photo",tags:["memories"]},
  {thumb:"thumbs/Imports - 10 of 18.jpg",label:"Photo",tags:["memories"]},
  {thumb:"thumbs/Imports - 11 of 18.jpg",label:"Photo",tags:["memories"]},
  {thumb:"thumbs/Imports - 12 of 18.jpg",label:"Photo",tags:["memories"]},
  {thumb:"thumbs/Imports - 13 of 18.jpg",label:"Photo",tags:["memories"]},
  {thumb:"thumbs/Imports - 14 of 18.jpg",label:"Photo",tags:["memories"]},
  {thumb:"thumbs/Imports - 15 of 18.jpg",label:"Photo",tags:["memories"]},
  {thumb:"thumbs/Imports - 16 of 18.jpg",label:"Photo",tags:["memories"]},
  {thumb:"thumbs/Imports - 3 of 19.jpg",label:"Photo",tags:["memories"]},
  {thumb:"thumbs/Imports - 5 of 19.jpg",label:"Photo",tags:["memories"]},
  {thumb:"thumbs/Imports - 16 of 19.jpg",label:"Photo",tags:["memories"]},
];
var cur="all",vis=[],idx=0;
function getVis(){return cur==="all"?PHOTOS:PHOTOS.filter(function(p){return p.tags.indexOf(cur)>=0;});}
function render(){
  vis=getVis();
  document.getElementById("grid").innerHTML=vis.map(function(p,i){
    return'<div class="photo-item" onclick="openLB('+i+')">'+'<img src="'+BASE+p.thumb+'" alt="'+p.label+'" loading="lazy" onload="this.classList.add(\'loaded\')"></div>';
  }).join("");
}
document.querySelectorAll(".filter-btn").forEach(function(b){
  b.addEventListener("click",function(){
    document.querySelectorAll(".filter-btn").forEach(function(x){x.classList.remove("active");});
    b.classList.add("active");cur=b.dataset.filter;render();
  });
});
function openLB(i){idx=i;showLB();document.getElementById("lightbox").classList.add("open");}
function showLB(){
  var p=vis[idx];
  var img=document.getElementById("lb-img");
  img.style.opacity="0";img.src=BASE+p.thumb;
  img.onload=function(){img.style.opacity="1";};
  document.getElementById("lb-caption").textContent=p.label;
  document.getElementById("lb-counter").textContent=(idx+1)+" / "+vis.length;
}
function closeLB(){document.getElementById("lightbox").classList.remove("open");}
function navLB(d){idx=(idx+d+vis.length)%vis.length;showLB();}
document.getElementById("lightbox").addEventListener("click",function(e){if(e.target===this)closeLB();});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeLB();if(e.key==="ArrowLeft")navLB(-1);if(e.key==="ArrowRight")navLB(1);});
render();
</script>
</body>
</html>
