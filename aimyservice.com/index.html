var cat = "all", q = "", curDomain = "", items = {}, notesCache = {};

function toggleSB() {
  var sb = document.getElementById("admin-sidebar");
  var btn = document.getElementById("admin-toggle");
  var open = !sb.classList.contains("collapsed");
  sb.classList.toggle("collapsed", open);
  btn.style.left = open ? "0" : "300px";
  btn.innerHTML = open ? "&#9654;" : "&#9664;";
  localStorage.setItem("sbOpen", open ? "0" : "1");
}
if (localStorage.getItem("sbOpen") === "0") {
  document.getElementById("admin-sidebar").classList.add("collapsed");
  document.getElementById("admin-toggle").style.left = "0";
  document.getElementById("admin-toggle").innerHTML = "&#9654;";
}

function switchTab(el) {
  document.querySelectorAll(".sb-tab").forEach(function(t) { t.classList.remove("active"); });
  document.querySelectorAll(".sb-section").forEach(function(s) { s.classList.remove("active"); });
  el.classList.add("active");
  document.getElementById("tab-" + el.dataset.tab).classList.add("active");
}

async function loadDomain() {
  curDomain = document.getElementById("sb-sel").value;
  if (!curDomain) return;
  renderList("task");
  renderList("goal");
  loadNotes();
  var r = await SB.from("domain_projects").select("*").eq("domain", curDomain).order("created_at");
  if (r.data) items[curDomain] = r.data;
  renderList("task");
  renderList("goal");
}

function getTyped(type) {
  return (items[curDomain] || []).filter(function(i) {
    return i.description && i.description.indexOf("[" + type + "]") === 0;
  });
}

function renderList(type) {
  var el = document.getElementById(type + "s-list");
  if (!curDomain) { el.innerHTML = '<div class="sb-empty">Select a domain above</div>'; return; }
  var typed = getTyped(type);
  if (!typed.length) { el.innerHTML = '<div class="sb-empty">No ' + type + 's yet</div>'; return; }
  el.innerHTML = typed.map(function(item) {
    var done = item.status === "completed";
    var pri = item.priority || "medium";
    var priLabel = pri === "high" ? "&#128308;" : pri === "low" ? "&#128994;" : "&#128993;";
    var cb = type === "task"
      ? '<input type="checkbox" class="sb-cb"' + (done ? " checked" : "") + ' onchange="toggle('' + item.id + '',this.checked)">'
      : "";
    return '<div class="sb-item">'
      + cb
      + '<span class="sb-item-text' + (done ? " done" : "") + '">' + item.title + '<span class="sb-priority pri-' + pri + '">' + priLabel + '</span></span>'
      + '<button class="sb-del" onclick="del('' + item.id + '')">&#215;</button>'
      + '</div>';
  }).join("");
}

async function addItem(type) {
  if (!curDomain) { alert("Select a domain first."); return; }
  var inp = document.getElementById(type + "-input");
  var text = inp.value.trim();
  if (!text) return;
  var pri = document.getElementById(type + "-pri").value;
  var r = await SB.from("domain_projects").insert({
    domain: curDomain,
    title: text,
    description: "[" + type + "] " + text,
    priority: pri,
    status: "active",
    notes: type
  });
  if (!r.error) {
    inp.value = "";
    setStatus(type + "-status", "Saved ✓", "#16a34a");
    await loadDomain();
  } else {
    setStatus(type + "-status", "Error: " + r.error.message, "#dc2626");
  }
}

async function toggle(id, done) {
  await SB.from("domain_projects").update({ status: done ? "completed" : "active" }).eq("id", id);
  await loadDomain();
}

async function del(id) {
  if (!confirm("Delete this item?")) return;
  await SB.from("domain_projects").delete().eq("id", id);
  await loadDomain();
}

async function loadNotes() {
  if (!curDomain) return;
  if (notesCache[curDomain] !== undefined) { document.getElementById("notes-area").value = notesCache[curDomain]; return; }
  var r = await SB.from("domain_projects").select("*").eq("domain", curDomain).eq("notes", "__notes__").maybeSingle();
  var val = r.data ? r.data.title : "";
  notesCache[curDomain] = val;
  document.getElementById("notes-area").value = val;
}

async function saveNotes() {
  if (!curDomain) { alert("Select a domain first."); return; }
  var text = document.getElementById("notes-area").value;
  notesCache[curDomain] = text;
  var r = await SB.from("domain_projects").select("id").eq("domain", curDomain).eq("notes", "__notes__").maybeSingle();
  if (r.data) {
    await SB.from("domain_projects").update({ title: text, updated_at: new Date().toISOString() }).eq("id", r.data.id);
  } else {
    await SB.from("domain_projects").insert({ domain: curDomain, title: text, description: "[notes]", notes: "__notes__", status: "active", priority: "low" });
  }
  setStatus("notes-status", "Saved ✓", "#16a34a");
}

function setStatus(id, msg, color) {
  var el = document.getElementById(id);
  el.textContent = msg; el.style.color = color || "#888";
  setTimeout(function() { el.textContent = ""; }, 2500);
}

function dk(h, a) {
  var r = parseInt(h.slice(1,3),16), g = parseInt(h.slice(3,5),16), b = parseInt(h.slice(5,7),16);
  return "rgb(" + Math.round(r*a) + "," + Math.round(g*a) + "," + Math.round(b*a) + ")";
}

function render() {
  var f = D.filter(function(d) {
    return (cat === "all" || d.category === cat) &&
           (!q || [d.name, d.tagline, d.domain, d.category].join(" ").toLowerCase().indexOf(q) >= 0);
  });
  document.getElementById("showing").textContent = f.length;
  document.getElementById("nav-count").textContent = f.length + " sites";
  var g = document.getElementById("grid");
  if (!f.length) { g.innerHTML = '<div class="no-results"><div style="font-size:3rem;margin-bottom:.75rem;">&#128269;</div>No results</div>'; return; }
  var html = "";
  for (var i = 0; i < f.length; i++) {
    var d = f[i];
    var bg = "linear-gradient(135deg," + d.color + " 0%," + dk(d.color, 0.5) + " 100%)";
    html += '<a class="card" href="https://' + d.domain + '/" target="_blank" rel="noopener">'
      + '<div class="thumb" style="background:' + bg + ';">'
      + '<div class="thumb-shine"></div>'
      + '<div class="thumb-icon">' + d.icon + '</div>'
      + '<div class="thumb-bottom"><div class="thumb-name">' + d.name + '</div><div class="thumb-tag">' + d.tagline + '</div></div>'
      + '<div class="thumb-badge">' + d.category + '</div>'
      + '</div>'
      + '<div class="card-body"><div class="card-name">' + d.name + '</div>'
      + '<div class="card-meta"><span class="card-domain">' + d.domain + '</span><span class="card-arrow">&#8594;</span></div></div>'
      + '</a>';
  }
  g.innerHTML = html;
}

document.querySelectorAll(".cat-btn").forEach(function(b) {
  b.addEventListener("click", function() {
    document.querySelectorAll(".cat-btn").forEach(function(x) { x.classList.remove("active"); });
    b.classList.add("active"); cat = b.dataset.cat; render();
  });
});
document.getElementById("search").addEventListener("input", function(e) {
  q = e.target.value.toLowerCase(); render();
});
document.getElementById("task-input").addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); addItem("task"); }
});
document.getElementById("goal-input").addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); addItem("goal"); }
});

render();
</script>
