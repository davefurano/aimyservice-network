*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f7f7f8;color:#0d0d0d;min-height:100vh;-webkit-font-smoothing:antialiased;}
/* NAV */
nav{position:sticky;top:0;z-index:200;background:#fff;border-bottom:1px solid #e5e5e5;padding:0 1.5rem;height:56px;display:flex;align-items:center;gap:1rem;}
.nav-logo{font-size:.95rem;font-weight:700;color:#0d0d0d;text-decoration:none;white-space:nowrap;letter-spacing:-.01em;}
.nav-logo span{color:#534AB7;}
.search-wrap{flex:1;max-width:480px;margin:0 auto;position:relative;}
.search-input{width:100%;padding:.5rem .9rem .5rem 2.25rem;background:#f7f7f8;border:1px solid #e5e5e5;border-radius:8px;font-family:inherit;font-size:.875rem;color:#0d0d0d;outline:none;transition:border-color .15s,box-shadow .15s;}
.search-input:focus{border-color:#534AB7;box-shadow:0 0 0 3px #534AB722;background:#fff;}
.search-input::placeholder{color:#999;}
.search-icon{position:absolute;left:.7rem;top:50%;transform:translateY(-50%);color:#aaa;font-size:.8rem;pointer-events:none;}
.nav-tag{font-size:.75rem;color:#666;white-space:nowrap;}
.nav-link{font-size:.78rem;font-weight:500;color:#666;text-decoration:none;padding:.4rem .85rem;border:1px solid #e5e5e5;border-radius:6px;transition:all .15s;white-space:nowrap;}
.nav-link:hover{color:#0d0d0d;border-color:#ccc;background:#f7f7f8;}
/* HERO */
.hero{background:#fff;border-bottom:1px solid #e5e5e5;padding:2.5rem 1.5rem 2rem;text-align:center;}
.hero-eyebrow{display:inline-flex;align-items:center;gap:.4rem;font-size:.72rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#534AB7;margin-bottom:.85rem;}
.hero h1{font-size:clamp(1.6rem,3.5vw,2.4rem);font-weight:700;letter-spacing:-.03em;line-height:1.15;color:#0d0d0d;margin-bottom:.5rem;}
.hero-sub{font-size:.9rem;color:#666;font-weight:400;max-width:520px;margin:0 auto;line-height:1.6;}

.filter-bar{background:#fff;border-bottom:1px solid #e5e5e5;padding:.6rem 1.5rem;display:flex;align-items:center;gap:.4rem;overflow-x:auto;scrollbar-width:none;}

.cat-btn{font-family:inherit;font-size:.75rem;font-weight:500;color:#555;background:#f7f7f8;border:1px solid #e5e5e5;border-radius:20px;padding:.3rem .85rem;cursor:pointer;white-space:nowrap;transition:all .15s;}
.cat-btn:hover{background:#f0f0f0;color:#0d0d0d;border-color:#ccc;}
.cat-btn.active{background:#534AB7;color:#fff;border-color:#534AB7;font-weight:600;}
/* STATS */
.stats-bar{background:#f7f7f8;border-bottom:1px solid #e5e5e5;padding:.45rem 1.5rem;display:flex;gap:1.5rem;font-size:.72rem;color:#888;}
.stats-bar strong{color:#444;font-weight:600;}
/* GRID */
.grid-wrap{max-width:1400px;margin:0 auto;padding:1.5rem 1.5rem 4rem;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem;}
/* CARD — YouTube rectangle thumbnail style */
.card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;overflow:hidden;text-decoration:none;display:block;transition:box-shadow .2s,transform .2s,border-color .2s;}
.card:hover{box-shadow:0 8px 32px rgba(0,0,0,.1);transform:translateY(-2px);border-color:#d0d0d0;}
/* 16:9 thumbnail */
.thumb{width:100%;aspect-ratio:16/9;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.thumb-bg{position:absolute;inset:0;background:linear-gradient(135deg,rgba(var(--cr),.12) 0%,rgba(var(--cr),.04) 100%);}
.thumb-pattern{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(var(--cr),.08) 1px,transparent 1px);background-size:20px 20px;}
.thumb-glow{position:absolute;width:60%;height:60%;border-radius:50%;background:radial-gradient(circle,rgba(var(--cr),.15) 0%,transparent 70%);}
.thumb-icon{position:relative;z-index:1;font-size:2.75rem;filter:drop-shadow(0 2px 12px rgba(var(--cr),.35));}
.thumb-cat{position:absolute;bottom:.5rem;left:.5rem;font-size:.6rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#fff;background:rgba(var(--cr),1);padding:.2rem .55rem;border-radius:4px;z-index:2;}
/* Card body */
.card-body{padding:.85rem 1rem .9rem;}
.card-name{font-size:.9rem;font-weight:600;color:#0d0d0d;line-height:1.3;margin-bottom:.2rem;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-tagline{font-size:.775rem;color:#666;line-height:1.45;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-domain{font-size:.68rem;color:#aaa;margin-top:.45rem;display:flex;align-items:center;gap:.3rem;}
.card-domain::before{content:"🔗";font-size:.6rem;}
/* No results */
.no-results{grid-column:1/-1;text-align:center;padding:5rem 2rem;color:#999;}
.no-results .big{font-size:2.5rem;display:block;margin-bottom:.75rem;}
/* Footer */
footer{border-top:1px solid #e5e5e5;padding:1.25rem 1.5rem;display:flex;justify-content:space-between;align-items:center;font-size:.75rem;color:#aaa;background:#fff;}
footer a{color:#888;text-decoration:none;}footer a:hover{color:#0d0d0d;}
@media(max-width:640px){
  nav{padding:0 1rem;gap:.75rem;}
  .hero{padding:1.75rem 1rem 1.5rem;}
  .filter-bar{padding:.5rem 1rem;}
  .stats-bar{padding:.4rem 1rem;gap:1rem;}
  .grid-wrap{padding:1rem 1rem 3rem;}
  .grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.75rem;}
  .thumb-icon{font-size:2rem;}
  .nav-link,.nav-tag{display:none;}
  footer{flex-direction:column;gap:.35rem;text-align:center;}
}
</style>
