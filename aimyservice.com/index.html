<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Inter",sans-serif;background:#f0f0f2;color:#111;-webkit-font-smoothing:antialiased;display:flex;min-height:100vh;}

/* ── ADMIN SIDEBAR ─────────────────────────────── */
.admin-sidebar{width:300px;min-width:300px;background:#fff;border-right:1px solid #e0e0e0;height:100vh;position:sticky;top:0;display:flex;flex-direction:column;transition:all .25s ease;overflow:hidden;z-index:200;}
.admin-sidebar.collapsed{width:0;min-width:0;border:none;}
.sb-head{padding:1rem;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;}
.sb-title{font-size:.85rem;font-weight:700;color:#111;letter-spacing:-.01em;}
.sb-close{background:none;border:none;font-size:1rem;cursor:pointer;color:#888;padding:.2rem .4rem;border-radius:4px;}
.sb-close:hover{background:#f5f5f7;color:#111;}

/* Domain selector */
.sb-domain-select{padding:.75rem 1rem;border-bottom:1px solid #f0f0f0;}
.sb-domain-select select{width:100%;font-family:inherit;font-size:.78rem;padding:.45rem .7rem;border:1px solid #e0e0e0;border-radius:8px;color:#111;background:#fff;outline:none;cursor:pointer;}
.sb-domain-select select:focus{border-color:#534AB7;}

/* Tabs */
.sb-tabs{display:flex;border-bottom:1px solid #f0f0f0;}
.sb-tab{flex:1;padding:.55rem;font-size:.72rem;font-weight:600;color:#888;background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;font-family:inherit;}
.sb-tab:hover{color:#111;}
.sb-tab.active{color:#534AB7;border-bottom-color:#534AB7;}

/* Content area */
.sb-content{flex:1;overflow-y:auto;padding:.75rem 1rem;}
.sb-section{display:none;}
.sb-section.active{display:block;}

/* Items */
.sb-items{margin-bottom:.75rem;}
.sb-item{display:flex;align-items:flex-start;gap:.5rem;padding:.5rem .6rem;background:#f9f9f9;border-radius:7px;margin-bottom:.4rem;border:1px solid #f0f0f0;}
.sb-item-text{flex:1;font-size:.78rem;color:#333;line-height:1.4;word-break:break-word;}
.sb-item-text.done{text-decoration:line-through;color:#aaa;}
.sb-cb{width:15px;height:15px;flex-shrink:0;cursor:pointer;accent-color:#534AB7;margin-top:1px;}
.sb-del{background:none;border:none;color:#ccc;cursor:pointer;font-size:.85rem;padding:0 .2rem;flex-shrink:0;line-height:1;}
.sb-del:hover{color:#dc2626;}
.sb-priority{font-size:.6rem;font-weight:700;padding:.1rem .4rem;border-radius:4px;margin-left:.25rem;}
.pri-high{background:#fee2e2;color:#dc2626;}
.pri-medium{background:#fef9c3;color:#a16207;}
.pri-low{background:#f0fdf4;color:#16a34a;}

/* Add form */
.sb-add{margin-top:.25rem;}
.sb-input{width:100%;font-family:inherit;font-size:.78rem;padding:.45rem .7rem;border:1px solid #e0e0e0;border-radius:7px;color:#111;outline:none;resize:none;}
.sb-input:focus{border-color:#534AB7;box-shadow:0 0 0 2px #534AB718;}
.sb-add-row{display:flex;gap:.4rem;margin-top:.4rem;align-items:center;}
.sb-add-row select{font-family:inherit;font-size:.72rem;padding:.35rem .5rem;border:1px solid #e0e0e0;border-radius:6px;color:#555;background:#fff;outline:none;}
.sb-btn{font-family:inherit;font-size:.72rem;font-weight:600;color:#fff;background:#534AB7;border:none;padding:.38rem .85rem;border-radius:6px;cursor:pointer;white-space:nowrap;transition:opacity .15s;}
.sb-btn:hover{opacity:.88;}
.sb-btn:disabled{opacity:.5;cursor:not-allowed;}
.sb-status{font-size:.7rem;color:#aaa;text-align:center;padding:.5rem;}
.sb-empty{font-size:.75rem;color:#bbb;text-align:center;padding:1.5rem .5rem;}

/* Notes textarea */
.notes-area{width:100%;min-height:120px;font-family:inherit;font-size:.78rem;padding:.6rem .7rem;border:1px solid #e0e0e0;border-radius:7px;color:#111;outline:none;resize:vertical;line-height:1.5;}
.notes-area:focus{border-color:#534AB7;box-shadow:0 0 0 2px #534AB718;}
.notes-save{margin-top:.4rem;}

/* Toggle button (always visible) */
.admin-toggle{position:fixed;left:0;top:50%;transform:translateY(-50%);z-index:300;background:#534AB7;color:#fff;border:none;cursor:pointer;width:24px;height:56px;border-radius:0 8px 8px 0;font-size:.9rem;display:flex;align-items:center;justify-content:center;transition:left .25s ease;box-shadow:2px 0 8px rgba(0,0,0,.15);}
.admin-toggle.open{left:300px;}

/* ── MAIN ─────────────────────────────────────── */
.main{flex:1;min-width:0;}
nav{background:#fff;border-bottom:1px solid #e0e0e0;padding:0 1.5rem;height:60px;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.nav-brand{font-size:1.1rem;font-weight:800;color:#111;letter-spacing:-.03em;white-space:nowrap;}
.nav-brand span{color:#534AB7;}
.search-wrap{flex:1;max-width:520px;margin:0 auto;position:relative;}
.search-input{width:100%;padding:.55rem 1rem .55rem 2.5rem;background:#f5f5f7;border:1.5px solid #e0e0e0;border-radius:10px;font-family:inherit;font-size:.875rem;font-weight:500;color:#111;outline:none;transition:all .15s;}
.search-input:focus{background:#fff;border-color:#534AB7;box-shadow:0 0 0 3px #534AB722;}
.search-input::placeholder{color:#999;}
.search-icon{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);font-size:.9rem;color:#aaa;pointer-events:none;}
.nav-count{font-size:.78rem;font-weight:600;color:#888;background:#f5f5f7;padding:.35rem .85rem;border-radius:20px;white-space:nowrap;}
.nav-link{font-size:.78rem;font-weight:600;color:#fff;background:#534AB7;text-decoration:none;padding:.4rem 1rem;border-radius:8px;white-space:nowrap;transition:opacity .15s;}
.nav-link:hover{opacity:.88;}
.hero{background:linear-gradient(135deg,#534AB7 0%,#534AB799 100%);padding:2.5rem 1.5rem 2rem;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:"";position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.07) 1px,transparent 1px);background-size:28px 28px;}
.hero-icon{font-size:3rem;display:block;margin-bottom:.6rem;position:relative;z-index:1;}
.hero h1{font-size:clamp(1.8rem,4vw,3rem);font-weight:900;color:#fff;letter-spacing:-.04em;line-height:1.05;margin-bottom:.4rem;position:relative;z-index:1;text-shadow:0 2px 12px rgba(0,0,0,.2);}
.hero-sub{font-size:.9rem;color:rgba(255,255,255,.85);font-weight:500;position:relative;z-index:1;}
.filter-bar{background:#fff;border-bottom:1px solid #e0e0e0;padding:.65rem 1.5rem;display:flex;align-items:center;gap:.4rem;overflow-x:auto;scrollbar-width:none;}
.filter-bar::-webkit-scrollbar{display:none;}
.cat-btn{font-family:inherit;font-size:.73rem;font-weight:600;color:#555;background:#f5f5f7;border:1.5px solid #e0e0e0;border-radius:20px;padding:.3rem .85rem;cursor:pointer;white-space:nowrap;transition:all .15s;}
.cat-btn:hover{background:#eee;color:#111;}
.cat-btn.active{background:#534AB7;color:#fff;border-color:#534AB7;}
.stats{background:#fff;border-bottom:1px solid #e0e0e0;padding:.45rem 1.5rem;display:flex;gap:2rem;font-size:.72rem;font-weight:600;color:#888;}
.stats strong{color:#111;}
.grid-wrap{padding:1.5rem;max-width:1600px;margin:0 auto;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.25rem;}
.card{background:#fff;border-radius:14px;overflow:hidden;text-decoration:none;display:block;box-shadow:0 2px 8px rgba(0,0,0,.07);transition:transform .2s,box-shadow .2s;}
.card:hover{transform:translateY(-5px);box-shadow:0 20px 60px rgba(0,0,0,.16);}
.thumb{width:100%;aspect-ratio:16/9;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.thumb-icon{font-size:100px;line-height:1;position:relative;z-index:2;filter:drop-shadow(0 8px 24px rgba(0,0,0,.45));}
.thumb-shine{position:absolute;top:-50%;left:-30%;width:70%;height:200%;background:linear-gradient(135deg,rgba(255,255,255,.2) 0%,transparent 50%);transform:skewX(-15deg);pointer-events:none;z-index:1;}
.thumb-bottom{position:absolute;bottom:0;left:0;right:0;padding:.65rem .85rem .7rem;background:linear-gradient(transparent,rgba(0,0,0,.88));z-index:3;}
.thumb-name{font-size:.8rem;font-weight:800;color:#fff;letter-spacing:.01em;line-height:1.2;}
.thumb-tag{font-size:.68rem;color:rgba(255,255,255,.78);margin-top:2px;}
.thumb-badge{position:absolute;top:.6rem;right:.6rem;font-size:.6rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#fff;background:rgba(0,0,0,.58);backdrop-filter:blur(4px);padding:.25rem .65rem;border-radius:5px;z-index:4;}
.card-body{padding:.8rem 1rem .9rem;}
.card-name{font-size:.9rem;font-weight:700;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-meta{display:flex;align-items:center;justify-content:space-between;margin-top:.35rem;}
.card-domain{font-size:.67rem;color:#aaa;font-weight:500;}
.card-arrow{font-size:.8rem;color:#534AB7;font-weight:700;opacity:0;transition:opacity .15s;}
.card:hover .card-arrow{opacity:1;}
.card-has-tasks{position:relative;}
.task-dot{position:absolute;top:.5rem;left:.5rem;width:8px;height:8px;border-radius:50%;background:#f59e0b;z-index:5;border:1.5px solid #fff;}
.no-results{grid-column:1/-1;text-align:center;padding:5rem 2rem;color:#999;}
footer{background:#fff;border-top:1px solid #e0e0e0;padding:1.25rem 1.5rem;display:flex;justify-content:space-between;align-items:center;font-size:.75rem;color:#aaa;margin-top:2rem;}
footer a{color:#888;text-decoration:none;}footer a:hover{color:#111;}
@media(max-width:900px){
  .admin-sidebar{display:none;}
  .admin-toggle{display:none;}
  .nav-link,.nav-count{display:none;}
  .hero{padding:2rem 1rem 1.5rem;}
  .grid-wrap{padding:1rem;}
  .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.75rem;}
  .thumb-icon{font-size:60px;}
}

var cat="all", q="", currentDomain="", domainItems={}, notesCache={};

// ── SIDEBAR ────────────────────────────────────────────
function toggleSidebar(){
  var sb=document.getElementById("admin-sidebar");
  var btn=document.getElementById("admin-toggle");
  var open=!sb.classList.contains("collapsed");
  sb.classList.toggle("collapsed",open);
  btn.classList.toggle("open",!open);
  btn.textContent=open?"▶":"◀";
  localStorage.setItem("adminOpen",open?"0":"1");
}

// Restore state
if(localStorage.getItem("adminOpen")==="0"){
  document.getElementById("admin-sidebar").classList.add("collapsed");
  var btn=document.getElementById("admin-toggle");
  btn.classList.remove("open"); btn.textContent="▶";
}

function switchTab(el){
  document.querySelectorAll(".sb-tab").forEach(function(t){t.classList.remove("active");});
  document.querySelectorAll(".sb-section").forEach(function(s){s.classList.remove("active");});
  el.classList.add("active");
  document.getElementById("tab-"+el.dataset.tab).classList.add("active");
}

// ── DOMAIN LOADING ─────────────────────────────────────
async function loadDomain(){
  currentDomain=document.getElementById("sb-domain-sel").value;
  if(!currentDomain)return;
  renderItems("task");
  renderItems("goal");
  loadNotes();
  await fetchItems();
}

async function fetchItems(){
  if(!currentDomain)return;
  var r=await SB.from("domain_projects").select("*").eq("domain",currentDomain).order("created_at");
  if(r.data) domainItems[currentDomain]=r.data;
  renderItems("task");
  renderItems("goal");
  updateTaskDots();
}

function renderItems(type){
  var listEl=document.getElementById(type+"s-list");
  if(!currentDomain){listEl.innerHTML='<div class="sb-empty">Select a domain above</div>';return;}
  var items=(domainItems[currentDomain]||[]).filter(function(i){return i.status===type||(type==="task"&&!i.status)||i.notes===type;});
  // filter by type using description field prefix
  var typed=(domainItems[currentDomain]||[]).filter(function(i){return i.description&&i.description.startsWith("["+type+"]");});
  if(!typed.length){listEl.innerHTML='<div class="sb-empty">No '+type+'s yet</div>';return;}
  listEl.innerHTML=typed.map(function(item){
    var done=item.status==="completed";
    var pri=item.priority||"medium";
    var priClass="pri-"+pri;
    var priLabel=pri==="high"?"🔴":pri==="low"?"🟢":"🟡";
    var text=item.title;
    return'<div class="sb-item" data-id="'+item.id+'">'
      +(type==="task"?'<input type="checkbox" class="sb-cb"'+(done?" checked":"")+" onchange="toggleDone('"+item.id+"',this.checked)">":"")
      +'<span class="sb-item-text'+(done?" done":"")+'">'+text+'<span class="sb-priority '+priClass+'">'+priLabel+'</span></span>'
      +'<button class="sb-del" onclick="deleteItem(''+item.id+'')">×</button>'
      +'</div>';
  }).join("");
}

async function addItem(type){
  if(!currentDomain){alert("Select a domain first.");return;}
  var inp=document.getElementById(type+"-input");
  var text=inp.value.trim();
  if(!text)return;
  var priority=document.getElementById(type+"-priority").value;
  var btn=document.querySelector("#tab-"+type+"s .sb-btn");
  btn.disabled=true;
  var r=await SB.from("domain_projects").insert({
    domain:currentDomain,
    title:text,
    description:"["+type+"] "+text,
    priority:priority,
    status:type==="task"?"active":"active",
    notes:type
  });
  btn.disabled=false;
  if(!r.error){
    inp.value="";
    setStatus(type+"-status","Saved ✓","#16a34a");
    await fetchItems();
  } else {
    setStatus(type+"-status","Error saving","#dc2626");
  }
}

async function toggleDone(id,done){
  await SB.from("domain_projects").update({status:done?"completed":"active"}).eq("id",id);
  await fetchItems();
}

async function deleteItem(id){
  if(!confirm("Delete this item?"))return;
  await SB.from("domain_projects").delete().eq("id",id);
  await fetchItems();
}

async function loadNotes(){
  if(!currentDomain)return;
  if(notesCache[currentDomain]!==undefined){document.getElementById("notes-area").value=notesCache[currentDomain];return;}
  var r=await SB.from("domain_projects").select("*").eq("domain",currentDomain).eq("notes","__notes__").maybeSingle();
  var val=r.data?r.data.title:"";
  notesCache[currentDomain]=val;
  document.getElementById("notes-area").value=val;
}

async function saveNotes(){
  if(!currentDomain){alert("Select a domain first.");return;}
  var text=document.getElementById("notes-area").value;
  notesCache[currentDomain]=text;
  var r=await SB.from("domain_projects").select("id").eq("domain",currentDomain).eq("notes","__notes__").maybeSingle();
  if(r.data){
    await SB.from("domain_projects").update({title:text,description:"[notes]",updated_at:new Date().toISOString()}).eq("id",r.data.id);
  } else {
    await SB.from("domain_projects").insert({domain:currentDomain,title:text,description:"[notes]",notes:"__notes__",status:"active",priority:"low"});
  }
  setStatus("notes-status","Notes saved ✓","#16a34a");
}

function setStatus(id,msg,color){
  var el=document.getElementById(id);
  el.textContent=msg; el.style.color=color||"#888";
  setTimeout(function(){el.textContent="";},2500);
}

function updateTaskDots(){
  document.querySelectorAll(".card").forEach(function(card){
    var domain=card.dataset.domain;
    var dot=card.querySelector(".task-dot");
    var hasItems=(domainItems[domain]||[]).filter(function(i){return i.status!=="completed"&&i.notes!=="__notes__";}).length>0;
    if(hasItems&&!dot){
      var d=document.createElement("div");d.className="task-dot";
      card.querySelector(".thumb").appendChild(d);
    } else if(!hasItems&&dot){dot.remove();}
  });
}

// ── GRID ───────────────────────────────────────────────
function dk(h,a){var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return"rgb("+Math.round(r*a)+","+Math.round(g*a)+","+Math.round(b*a)+")";}

function render(){
  var f=D.filter(function(d){return(cat==="all"||d.category===cat)&&(!q||[d.name,d.tagline,d.domain,d.category].join(" ").toLowerCase().includes(q));});
  document.getElementById("showing").textContent=f.length;
  document.getElementById("nav-count").textContent=f.length+" sites";
  var g=document.getElementById("grid");
  if(!f.length){g.innerHTML='<div class="no-results"><div style="font-size:3rem;margin-bottom:.75rem;">🔍</div>No results</div>';return;}
  g.innerHTML=f.map(function(d){
    var bg="linear-gradient(135deg,"+d.color+" 0%,"+dk(d.color,0.5)+" 100%)";
    return'<a class="card" href="https://'+d.domain+'/" target="_blank" rel="noopener" data-domain="'+d.domain+'" onclick="selectDomain(event,''+d.domain+'')">'+
      '<div class="thumb" style="background:'+bg+';">'+
        '<div class="thumb-shine"></div>'+
        '<div class="thumb-icon">'+d.icon+'</div>'+
        '<div class="thumb-bottom"><div class="thumb-name">'+d.name+'</div><div class="thumb-tag">'+d.tagline+'</div></div>'+
        '<div class="thumb-badge">'+d.category+'</div>'+
      '</div>'+
      '<div class="card-body"><div class="card-name">'+d.name+'</div>'+
      '<div class="card-meta"><span class="card-domain">'+d.domain+'</span><span class="card-arrow">→</span></div></div>'+
    '</a>';
  }).join("");
}

function selectDomain(e,domain){
  // Hold shift to open admin panel for domain instead of navigating
  if(e.shiftKey){
    e.preventDefault();
    document.getElementById("sb-domain-sel").value=domain;
    loadDomain();
    // Open sidebar if closed
    var sb=document.getElementById("admin-sidebar");
    if(sb.classList.contains("collapsed"))toggleSidebar();
  }
}

document.querySelectorAll(".cat-btn").forEach(function(b){
  b.addEventListener("click",function(){document.querySelectorAll(".cat-btn").forEach(function(x){x.classList.remove("active");});b.classList.add("active");cat=b.dataset.cat;render();});
});
document.getElementById("search").addEventListener("input",function(e){q=e.target.value.toLowerCase();render();});

// Enter to add
document.getElementById("task-input").addEventListener("keydown",function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();addItem("task");}});
document.getElementById("goal-input").addEventListener("keydown",function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();addItem("goal");}});

render();
</script>
