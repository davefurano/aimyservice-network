function hexToRgb(h) {
  return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
}

function drawThumb(canvas, d) {
  var W = canvas.width, H = canvas.height;
  var ctx = canvas.getContext("2d");
  var rgb = hexToRgb(d.color);
  var r=rgb[0],g=rgb[1],b=rgb[2];

  // Gradient background
  var grd = ctx.createLinearGradient(0,0,W,H);
  grd.addColorStop(0, d.color);
  grd.addColorStop(1, "rgb("+Math.round(r*.45)+","+Math.round(g*.45)+","+Math.round(b*.45)+")");
  ctx.fillStyle = grd;
  ctx.fillRect(0,0,W,H);

  // Subtle dot pattern
  ctx.fillStyle = "rgba(255,255,255,0.06)";
  for(var x=20;x<W;x+=36) for(var y=20;y<H;y+=36) {ctx.beginPath();ctx.arc(x,y,2.5,0,Math.PI*2);ctx.fill();}

  // Shine overlay
  var shine = ctx.createLinearGradient(0,0,W*.7,H);
  shine.addColorStop(0,"rgba(255,255,255,0.18)");
  shine.addColorStop(1,"rgba(255,255,255,0)");
  ctx.fillStyle = shine;
  ctx.fillRect(0,0,W,H);

  // BIG emoji — fills most of the thumbnail
  var emojiSize = Math.round(H * 0.72);
  ctx.font = emojiSize + "px 'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  // Shadow for depth
  ctx.shadowColor = "rgba(0,0,0,0.45)";
  ctx.shadowBlur = 32;
  ctx.shadowOffsetY = 8;
  ctx.fillText(d.icon, W/2, H/2 - 18);
  ctx.shadowColor = "transparent";

  // Bottom bar
  var barH = Math.round(H * 0.32);
  var barY = H - barH;
  var barGrd = ctx.createLinearGradient(0,barY,0,H);
  barGrd.addColorStop(0,"rgba(0,0,0,0)");
  barGrd.addColorStop(0.4,"rgba(0,0,0,0.75)");
  barGrd.addColorStop(1,"rgba(0,0,0,0.92)");
  ctx.fillStyle = barGrd;
  ctx.fillRect(0,barY,W,barH);

  // Domain name on bottom bar
  var nameSize = Math.round(H * 0.085);
  ctx.font = "800 "+nameSize+"px Inter,system-ui,sans-serif";
  ctx.textAlign = "left";
  ctx.textBaseline = "alphabetic";
  ctx.fillStyle = "#ffffff";
  ctx.fillText(d.name, 20, H - Math.round(H*0.18));

  // Tagline
  var tagSize = Math.round(H * 0.062);
  ctx.font = "400 "+tagSize+"px Inter,system-ui,sans-serif";
  ctx.fillStyle = "rgba(255,255,255,0.78)";
  ctx.fillText(d.tagline, 20, H - Math.round(H*0.085));

  // Category badge top-right
  var badgePad = 10;
  var badgeH = Math.round(H*0.1);
  ctx.font = "700 "+Math.round(H*0.065)+"px Inter,system-ui,sans-serif";
  ctx.textAlign = "right";
  ctx.textBaseline = "middle";
  var badgeW = ctx.measureText(d.category).width + badgePad*2;
  var bx = W - badgeW - 12;
  var by = 12;
  ctx.fillStyle = "rgba(0,0,0,0.55)";
  ctx.beginPath();
  ctx.roundRect(bx, by, badgeW, badgeH, 5);
  ctx.fill();
  ctx.fillStyle = "#ffffff";
  ctx.fillText(d.category, W-12-badgePad, by+badgeH/2);
}

function makeCard(d) {
  var wrap = document.createElement("a");
  wrap.className = "card";
  wrap.href = "https://"+d.domain+"/";
  wrap.target = "_blank";
  wrap.rel = "noopener";

  // Canvas thumbnail
  var tw = document.createElement("div");
  tw.className = "thumb-wrap";
  var canvas = document.createElement("canvas");
  canvas.width = 600;
  canvas.height = 338; // 16:9
  drawThumb(canvas, d);
  tw.appendChild(canvas);

  var body = document.createElement("div");
  body.className = "card-body";
  body.innerHTML =
    '<div class="card-name">'+d.name+'</div>'+
    '<div class="card-tagline">'+d.tagline+'</div>'+
    '<div class="card-meta"><span class="card-domain">'+d.domain+'</span><span class="card-arrow">→</span></div>';

  wrap.appendChild(tw);
  wrap.appendChild(body);
  return wrap;
}

function render() {
  var f = D.filter(function(d) {
    return (cat==="all"||d.category===cat) &&
           (!q||[d.name,d.tagline,d.domain,d.category].join(" ").toLowerCase().includes(q));
  });
  document.getElementById("showing").textContent = f.length;
  document.getElementById("nav-count").textContent = f.length+" sites";
  var g = document.getElementById("grid");
  g.innerHTML = "";
  if(!f.length) {
    g.innerHTML='<div class="no-results"><span style="font-size:3rem;display:block;margin-bottom:.75rem;">🔍</span>No results for <strong>"'+q+'"</strong></div>';
    return;
  }
  f.forEach(function(d){g.appendChild(makeCard(d));});
}

document.querySelectorAll(".cat-btn").forEach(function(b){

    document.querySelectorAll(".cat-btn").forEach(function(x){x.classList.remove("active");});
    b.classList.add("active"); cat=b.dataset.cat; render();
  });
});
document.getElementById("search").addEventListener("input",function(e){q=e.target.value.toLowerCase();render();});
render();
</script>
