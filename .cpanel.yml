    - /bin/cp -rf avastar.app/. $DEPLOYPATH/avastarapp/
    - /bin/cp -rf avatarhouseband.com/. $DEPLOYPATH/avatarhousebandcom/
    - /bin/cp -rf avatarhousebands.com/. $DEPLOYPATH/avatarhousebandscom/
